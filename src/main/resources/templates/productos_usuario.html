<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Productos - Candy House</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-texture">

<header class="topbar">
    <img th:src="@{/imagenes/logo_candy_house.png}" class="logo-small" alt="Logo">
    <div style="display:flex; gap:10px">
        <a href="/panel_usuario" class="btn-pink">Panel</a>
        <a href="/carrito" class="btn-green">Carrito</a>
        <a href="/logout" class="btn-pink">Salir</a>
    </div>
</header>

<section class="view-section">
    <h1>🛍️ Productos</h1>

    <!-- Error de stock -->
    <div th:if="${param.errorStock != null}"
         style="background:#fdecea; color:#c0392b; padding:12px 18px;
                border-radius:12px; margin-bottom:16px; font-size:14px;
                border:1px solid #f5c6c6; max-width:600px;">
        ⚠ No puedes agregar más unidades de "<span th:text="${param.errorStock}"></span>",
        has alcanzado el stock disponible.
    </div>

    <!-- Buscador -->
    <form method="get" action="/ver_productos_usuario"
          style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
        <input type="text" name="buscar" th:value="${buscar}"
               placeholder="Buscar por nombre o categoría..."
               style="padding:8px 16px; border-radius:50px; border:2px solid #f3c2cc;
                      font-size:13px; font-family:'Poppins',sans-serif; outline:none;
                      width:280px; color:#5a3a33;">
        <button type="submit" class="btn-pink" style="padding:8px 18px; font-size:13px;">Buscar</button>
        <a th:if="${buscar != null and !buscar.isEmpty()}"
           href="/ver_productos_usuario" class="btn-yellow"
           style="padding:8px 18px; font-size:13px;">Limpiar</a>
    </form>

    <!-- Sin resultados -->
    <p th:if="${buscar != null and !buscar.isEmpty() and #lists.isEmpty(productos)}"
       style="color:#c4808f; font-size:14px; margin-top:4px; font-style:italic;">
        No se encontraron productos para "<strong th:text="${buscar}"></strong>".
    </p>

    <div class="grid">
        <div class="product-card" th:each="p : ${productos}">

            <img th:if="${p.imagenUrl != null and !#strings.isEmpty(p.imagenUrl)}"
                 th:src="${p.imagenUrl}" alt="Imagen del producto"
                 style="width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:10px;">

            <img th:if="${p.imagenUrl == null or #strings.isEmpty(p.imagenUrl)}"
                 th:src="@{/imagenes/no-image.png}" alt="Sin imagen"
                 style="width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:10px;">

            <h3 th:text="${p.nombrePro}"></h3>
            <p>Categoría: <span th:text="${p.categoria}"></span></p>
            <p>Precio: $<span th:text="${p.precio}"></span></p>
            <p>Stock:
                <span th:if="${p.existenciaProd == 0}" class="badge-agotado">✕ Agotado</span>
                <span th:if="${p.existenciaProd > 0 and p.existenciaProd <= 10}" class="badge-stock-bajo">⚠ [[${p.existenciaProd}]]</span>
                <span th:if="${p.existenciaProd > 10}" th:text="${p.existenciaProd}"></span>
            </p>

            <details>
                <summary>Descripción</summary>
                <span th:text="${p.descripcion}"></span>
            </details>

            <form th:action="@{/carrito/agregar}" method="post" th:if="${p.existenciaProd > 0}">
                <input type="hidden" name="productoCod" th:value="${p.productoCod}">
                <label>Cantidad:</label>
                <input type="number" name="cantidad" value="1" min="1"
                       th:max="${p.existenciaProd}" required>
                <button type="submit" class="btn-green">Agregar al carrito</button>
            </form>

            <p th:if="${p.existenciaProd == 0}"
               style="color:#c0392b; font-size:13px; margin-top:10px;">
                Producto no disponible
            </p>
        </div>
    </div>

    <!-- Paginación -->
    <div th:replace="~{paginacion :: controles(paginaActual=${paginaActual}, totalPaginas=${totalPaginas}, url='/ver_productos_usuario?buscar=' + ${buscar})}"></div>

</section>

<footer>© 2026 Delicias Candy House</footer>
</body>
</html>
