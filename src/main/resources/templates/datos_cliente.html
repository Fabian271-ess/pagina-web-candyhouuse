<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><title>Mis Datos - Candy House</title>
<link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body class="bg-texture">
<header class="topbar">
    <img th:src="@{/imagenes/logo_candy_house.png}" class="logo-small" alt="Logo">
    <div style="display:flex; gap:10px">
        <a href="/logout" class="btn-pink">Salir</a>
    </div>
</header>
<section class="clientes-section">
<div class="clientes-box">
<h2>Completa tus datos</h2>
<form action="/guardar_cliente" method="POST">
    <select name="tipo_doc" required>
        <option value="T.I">T.I</option>
        <option value="PPT">PPT</option>
        <option value="C.c">C.c</option>
    </select>
    <input type="number" name="cliente_doc"  placeholder="Número documento" required>
    <input type="text"   name="nombre_cli"   placeholder="Nombre" required>
    <input type="text"   name="apellido_cli" placeholder="Apellido" required>
    <input type="number" name="telefono"     placeholder="Teléfono" required>
    <button type="submit" class="btn-green">Guardar</button>
</form>
</div>
</section>
<footer>© 2026 Delicias Candy House</footer>
</body>
</html>
