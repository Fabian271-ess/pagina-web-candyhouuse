    <title>Panel Usuario - Candy House</title>

<body class="bg-texture">

<header class="topbar">
    <img th:src="@{/imagenes/logo_candy_house.png}" class="logo-small" alt="Logo">
    <div style="display:flex; gap:10px">
        <a href="/panel_usuario" class="btn-pink">Panel</a>
        <a href="/logout" class="btn-pink">Salir</a>
    </div>
</header>

<section class="view-section">
    <h2>Panel Usuario</h2>
    <div class="grid">

        <div class="card">
            <img th:src="@{/imagenes/logo_productos_cli.png}" width="80" alt="">
            <h3>Productos</h3>
            <a href="/ver_productos_usuario" class="btn-pink">Ver</a>
        </div>

        <div class="card">
            <img th:src="@{/imagenes/logo_carrito.png}" width="80" alt="">
            <h3>Tu Carrito</h3>
            <a href="/carrito" class="btn-pink">Ver</a>
        </div>

        <div class="card">
            <img th:src="@{/imagenes/logo_pedidos.png}" width="80" alt="">
            <h3>Mis Pedidos</h3>
            <a href="/mis_pedidos" class="btn-pink">Ver</a>
        </div>

        <div class="card">
            <img th:src="@{/imagenes/logo_clientes.png}" width="80" alt="">
            <h3>Mis Datos</h3>
            <a href="/editar_cliente" class="btn-pink">Editar</a>
        </div>

    </div>
</section>
