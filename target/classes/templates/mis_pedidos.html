<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><title>Mis Pedidos - Candy House</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body class="bg-texture">
<header class="topbar">
    <img th:src="@{/imagenes/logo_candy_house.png}" class="logo-small" alt="Logo">
    <div style="display:flex; gap:10px">
        <a href="/panel_usuario" class="btn-pink">Panel</a>
        <a href="/logout" class="btn-pink">Salir</a>
    </div>
</header>
<section class="clientes-section">
    <div class="clientes-box">
        <h2>📋 Mis Pedidos</h2>

        <p style="text-align:center; color:#9a6a73; font-size:14px; margin-bottom:20px;">
            Cuando tu pedido sea entregado, recibirás la factura en tu correo electrónico automáticamente.
        </p>

        <table class="tabla-clientes">
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Entrega</th>
                <th>Ciudad</th>
                <th>Estado</th>
            </tr>
            <tr th:each="p : ${pedidos}">
                <td th:text="${p.idPedido}"></td>
                <td th:text="${p.fechaPedido != null ? p.fechaPedido.toLocalDate() : '—'}"></td>
                <td th:text="${p.fechaEntrega}"></td>
                <td th:text="${p.ciudad}"></td>
                <td>
                    <span th:if="${p.estado.name() == 'pendiente'}"
                          style="color:orange; font-weight:bold;" th:text="${p.estado}"></span>
                    <span th:if="${p.estado.name() == 'entregado'}"
                          style="color:green; font-weight:bold;" th:text="${p.estado}"></span>
                    <span th:if="${p.estado.name() == 'cancelado'}"
                          style="color:gray; font-weight:bold;" th:text="${p.estado}"></span>
                </td>
            </tr>
        </table>

        <!-- Paginacion -->
        <div th:replace="~{paginacion :: controles(paginaActual=${paginaActual}, totalPaginas=${totalPaginas}, url='/mis_pedidos')}"></div>

    </div>
</section>
<footer>© 2026 Delicias Candy House</footer>
</body>
</html>
